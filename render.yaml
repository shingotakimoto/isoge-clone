## 割安判定ロジック（appraisal.py）

1. 同一市区町村の中古マンション事例を取得（**成約価格を優先**、不足分は取引価格で補完）
2. ㎡単価の **外れ値をIQRで除去**
3. 対象の築年における推定㎡単価を算出
   - 事例が十分（12件以上）→ `単価 = b0 + b1×築年` の **最小二乗回帰**で予測
   - 少ない → **類似事例の中央値 × 築年補正係数**
4. `推定相場 = 推定㎡単価 × 専有面積`
5. `売出価格 ÷ 推定相場` で判定

| グレード | 売出/推定 | 意味 |
|---|---|---|
| **A** | ≤0.85 | 非常に割安 |
| **B** | ≤0.93 | 割安 |
| **C** | ≤1.02 | ほぼ適正 |
| **D** | ≤1.12 | やや割高 |
| **E** | >1.12 | 割高 |

信頼度は事例件数とばらつき（変動係数）から自動算出します。

