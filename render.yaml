# ISOGE! クローン — マンション割安判定サービス

SUUMOの中古マンションURLから、周辺の **実取引・成約価格**（国土交通省データ）をもとに
「割安／割高」を判定するサービスのプロトタイプです。
**LINE Bot** と **Webアプリ** の2つの入口を、1つのバックエンドで提供します。

> 本家 [ISOGE!](https://isoge.me/) と同等の体験（SUUMOリンク → 割安度・推定相場・成約事例）を、
> 公開APIで再現した学習・検証用の実装です。

---

## 何ができるか

1. ユーザーが中古マンションの **SUUMO URL** を送る（LINE / Web）
2. ページから 価格・専有面積・築年・所在地・間取り を取得
3. 所在地の市区町村で、国交省の **取引価格・成約価格** を照会
4. 築年で㎡単価を補正して **推定相場** を算出
5. 売出価格と比較して **割安度を A〜E で判定**＋**周辺の成約事例**を提示

判定結果の例（デモ）:

```
割安度   : B（割安）   信頼度 高
売出価格 : 5,280万円
推定相場 : 5,760万円（5,160万〜6,360万）
判定     : 相場より 480万円 割安（▼8%）
根拠     : 築年回帰（29件）・事例38件 うち成約28件
```

