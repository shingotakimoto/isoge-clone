## ⚠️ 重要な注意

- **SUUMOの自動取得（スクレイピング）は同サイトの利用規約に抵触する可能性があります。**
  本番運用ではSUUMO（リクルート）の許諾、または公式に提供されるデータの利用を検討してください。
  `suumo.py` は解析部を差し替え可能・低頻度アクセス前提・手入力フォールバック付きで実装しています。
- 国交省の取引価格情報は **アンケート回収分（回収率 約3割）** のため、
  地方や取引の少ないエリアでは事例が不足し判定できないことがあります。
- 成約価格情報は **2021年以降** のみ提供されます。
- 本サービスの判定は **推定値** であり、割安判定が出ても利益を保証するものではありません。
  実際の購入判断は、個別条件（階・向き・管理状態・リフォーム等）も含め総合的に行ってください。
- **データ出典: 国土交通省 不動産情報ライブラリ**（[利用規約](https://www.reinfolib.mlit.go.jp/help/termsOfUse/)を確認のこと）

