## Web版の起動

```bash
# .env を読み込んで起動（python-dotenvを利用する場合）
export $(grep -v '^#' .env | xargs)   # もしくは各ホスティングの環境変数機能で設定
python app.py
```

ブラウザで `http://localhost:5000` を開き、SUUMOの物件URLを貼り付けて「判定する」。

---

## LINE Bot版のセットアップ

1. **LINE Developers** でプロバイダー → **Messaging API チャネル**を作成
2. 「チャネル基本設定」→ **チャネルシークレット** を `LINE_CHANNEL_SECRET` へ
3. 「Messaging API設定」→ **チャネルアクセストークン（長期）** を発行し `LINE_CHANNEL_ACCESS_TOKEN` へ
4. 同画面で **応答メッセージ＝オフ / Webhook＝オン** に設定
5. サーバーを公開し、Webhook URL を `https://<あなたのドメイン>/callback` に設定 → 「検証」
6. LINEで友だち追加し、SUUMOのURLを送信すると割安判定カードが返ります

### ローカルで試す（ngrok）

```bash
python app.py                 # :5000 で起動
ngrok http 5000               # 別ターミナル。発行URL + /callback をWebhookに設定
```

### デプロイ（例）

- **Render / Railway / Fly.io / Cloud Run** などにそのまま載ります
- 本番起動コマンド例: `gunicorn app:app --bind 0.0.0.0:$PORT`
- 環境変数に `LINE_CHANNEL_SECRET` / `LINE_CHANNEL_ACCESS_TOKEN` / `REINFOLIB_API_KEY` を設定

