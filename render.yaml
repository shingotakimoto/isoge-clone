## セットアップ

### 1. 依存をインストール

```bash
cd isoge-line-bot
python -m venv venv && source venv/bin/activate   # Windowsは venv\Scripts\activate
pip install -r requirements.txt
```

### 2. すぐ動かして試す（キー不要・デモモード）

```bash
# CLIでロジックだけ確認
python cli.py --demo

# Web版をデモモードで起動 → http://localhost:5000 を開き「サンプル物件で試す」
DEMO_MODE=1 python app.py        # Windows(PowerShell): $env:DEMO_MODE=1; python app.py
```

### 3. 本番用のキーを取得

| キー | 取得先 | 備考 |
|------|--------|------|
| `REINFOLIB_API_KEY` | [不動産情報ライブラリ API利用申請](https://www.reinfolib.mlit.go.jp/api/request/) | **無料**・発行まで**約5営業日**。先に申請推奨 |
| `LINE_CHANNEL_SECRET` / `LINE_CHANNEL_ACCESS_TOKEN` | [LINE Developers](https://developers.line.biz/) | Messaging APIチャネルを作成して取得 |

`.env.example` をコピーして `.env` を作り、値を設定:

```bash
cp .env.example .env
# .env を編集してキーを記入
```

